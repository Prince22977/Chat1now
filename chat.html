<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat1now</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Chat1now</h2>
                <span class="user-badge" id="my-username-display">@username</span>
            </div>

            <div class="search-box">
                <input type="text" id="user-search-input" placeholder="🔍Search for Friends">
                <div id="search-results" class="search-results hidden"></div>
            </div>

            <div class ="sidebar-section">
                <h3>Public Rooms</h3>
                <ul class="room-list">
                    <li class="room-item active" data-room="general">#general-chat</li>
                    <li class="room-item" data-room="gaming">#gaming</li>
                </ul>
            </div>

            <div class="sidebar-section">
                <h3>Direct Messages</h3>
                <ul class="dm-list" id="active-dm-list"></ul>
            </div>
        </aside>
        
        <main class="chat-area">
            <header class="chat-header">
                <button class="menu-toggle" id="menu-toggle">☰</button>
                <div class="chat-info"> 
                    <h2 id="current-room-title">#general-chat</h2>
                    <p id="chat-type-subtitle">Public Room</p>
                </div>

                <button id="mute-btn" class="mute-btn" title="Mute Room">🔔</button>
            </header>

            <div class="message-container" id="message-container"></div>

            <form class="input-area" id="message-form">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required>
                <button type="submit" id="send-button">send</button>
            </form>
        </main>
    </div>

    <script type="module" src="chat.js"></script>
</body>
</html>
