<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="chat-wrapper">
        <header class="chat-header">
            <div class="room-info">
                <h3>The Squad</h3>
                <p>for friends online</p>
            </div>
        </header>
        
       <main class="message-container" id="message-container">
            </main>

        <footer class="chat-input-area">
            <form id="chat-form">
                <input type="text" placeholder="Type a message..." id="msg-input" required autocomplete="off">
                <button type="submit" class="send-btn">Send</button>
            </form>
        </footer>
    </div>

    <script type="module" src="chat.js"></script>
</body>
</html>
